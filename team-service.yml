spring:
  application:
    name: teamService

  kafka:   # ✅ CORRECT LEVEL
    consumer:
      group-id: team-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.ipl.teamService.service.MatchCreatedEvent

  datasource:
    url: jdbc:mysql://localhost:3306/team_db
    username: myuser
    password: myuser

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  properties:
    hibernate:
      dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8083
      
